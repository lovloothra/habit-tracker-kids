<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffb7d5" />
    <title>My Sparkle Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head><script src="https://jsdelivr.com/cdn/jQuery/3.5.1/jquery.min.js"></script>
  <body>
    <div class="app">
      <header class="header" role="banner">
        <div class="header__art" aria-hidden="true">
          <svg class="unicorn" viewBox="0 0 120 100" width="88" height="74">
            <defs>
              <linearGradient id="uniBody" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffe0f0" />
                <stop offset="100%" stop-color="#ffc2e0" />
              </linearGradient>
              <linearGradient id="uniHorn" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffe9a8" />
                <stop offset="100%" stop-color="#f5c542" />
              </linearGradient>
            </defs>
            <ellipse cx="58" cy="62" rx="38" ry="28" fill="url(#uniBody)" />
            <ellipse cx="88" cy="58" rx="18" ry="22" fill="url(#uniBody)" />
            <circle cx="96" cy="52" r="4" fill="#4a3f55" />
            <path d="M52 28 L58 8 L64 28 Z" fill="url(#uniHorn)" />
            <path
              d="M30 48 Q18 38 14 52 Q22 56 30 48"
              fill="#e8b4ff"
              opacity="0.9"
            />
            <path
              d="M72 78 Q88 88 100 72"
              stroke="#d896ff"
              stroke-width="4"
              fill="none"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <h1 class="header__title">My Sparkle Day</h1>
        <p class="header__subtitle">Tap what you did today. You are awesome.</p>
      </header>

      <main class="main">
        <section class="panel panel--today" aria-labelledby="today-heading">
          <div class="today-bar">
            <h2 id="today-heading" class="panel__title">Today</h2>
            <p class="today-bar__date" id="todayDateLabel" aria-live="polite"></p>
          </div>

          <form id="dayForm" class="day-form" novalidate>
            <div id="questionsRoot" class="questions"></div>

            <div class="save-row">
              <button type="submit" class="btn btn--primary" id="saveBtn">
                Save my day
              </button>
              <p class="save-hint" id="saveHint" role="status" aria-live="polite"></p>
            </div>
          </form>
        </section>

        <section class="panel panel--rewards" aria-labelledby="rewards-heading">
          <h2 id="rewards-heading" class="panel__title">Stars &amp; streaks</h2>
          <p class="panel__lede" id="streakAsOf"></p>
          <div class="badges-scroll" id="badgesRoot" aria-label="Reward badges"></div>
        </section>

        <section class="panel panel--history">
          <button
            type="button"
            class="accordion__trigger"
            id="historyToggle"
            aria-expanded="false"
            aria-controls="historyPanel"
          >
            <span>See past days</span>
            <span class="accordion__chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion__panel" id="historyPanel" hidden>
            <div id="historyRoot" class="history"></div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p class="footer__text">Made with love. Your answers stay on this device.</p>
      </footer>
    </div>

    <div
      id="toastRegion"
      class="toast-region"
      role="status"
      aria-live="polite"
      aria-relevant="additions"
    ></div>

    <div
      id="modalRoot"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      hidden
    >
      <div class="modal__backdrop" data-close-modal></div>
      <div class="modal__card">
        <div class="modal__unicorn" aria-hidden="true">🦄</div>
        <h3 id="modalTitle" class="modal__title"></h3>
        <p id="modalBody" class="modal__body"></p>
        <button type="button" class="btn btn--primary" id="modalOk">Yay!</button>
      </div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
